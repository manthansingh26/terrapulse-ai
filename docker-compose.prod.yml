version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: terrapulse-db-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: terrapulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - terrapulse-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: terrapulse-backend-prod
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/terrapulse_db
      DEBUG: False
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      WAQI_API_KEY: ${WAQI_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - terrapulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: terrapulse-frontend-prod
    environment:
      VITE_API_URL: ${FRONTEND_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - terrapulse-network

  redis:
    image: redis:7-alpine
    container_name: terrapulse-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - terrapulse-network

volumes:
  postgres_data:
  redis_data:

networks:
  terrapulse-network:
    driver: bridge
